  <!-- Supabase Client Library (MUST NOT BE ASYNC) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Inline Supabase Config -->
  <script>
    console.log('[Config] Supabase config starting...');
    
    try {
      const SUPABASE_URL = 'https://tgtuxvmuapiltmkulvlk.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_8mmv4aAB8mPRvYe459ZwGQ_KVVJROax';
      
      let supabase = null;
      let supabaseReady = false;
      
      async function initializeSupabase() {
        try {
          if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
            console.warn('[Supabase] Credentials not configured');
            return false;
          }
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          supabaseReady = true;
          console.log('[Supabase] ✅ Initialized');
          return true;
        } catch (err) {
          console.error('[Supabase] Initialize error:', err.message);
          return false;
        }
      }
      
      async function getCurrentUser() {
        if (!supabaseReady) return null;
        try {
          // Check localStorage for username/password session first
          const sessionStr = localStorage.getItem('tbr_user_session');
          if (sessionStr) {
            const session = JSON.parse(sessionStr);
            console.log('[Supabase] User session from localStorage:', session.username);
            return {
              id: session.user_id,
              username: session.username,
              role_id: session.role_id,
              is_active: session.is_active
            };
          }

          // Fallback to Supabase Auth (legacy)
          const { data: { user }, error } = await supabase.auth.getUser();
          if (error) throw error;
          return user;
        } catch (err) {
          console.error('[Supabase] getCurrentUser error:', err.message);
          return null;
        }
      }
      
      async function getUserProfile(userId) {
        if (!supabaseReady) return null;
        try {
          // First get the user data WITHOUT roles join (avoids recursion)
          const { data: userData, error: userError } = await supabase
            .from('users')
            .select('id, email, name, created_at')
            .eq('id', userId)
            .single();
          
          if (userError) throw userError;
          if (!userData) return null;
          
          // Then separately get the role if needed
          const { data: roleData } = await supabase
            .from('roles')
            .select('role')
            .eq('user_id', userId)
            .maybeSingle();
          
          if (roleData) {
            userData.role = roleData.role;
          }
          
          return userData;
        } catch (err) {
          console.error('[Supabase] getUserProfile error:', err.message);
          return null;
        }
      }
      
      async function signUp(email, password, name) {
        if (!supabaseReady) return null;
        try {
          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { name } }
          });
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('[Supabase] signUp error:', err.message);
          return null;
        }
      }
      
      async function signIn(email, password) {
        if (!supabaseReady) return null;
        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
          });
          if (error) throw error;
          return data;
        } catch (err) {
          console.error('[Supabase] signIn error:', err.message);
          return null;
        }
      }
      
      async function signOut() {
        if (!supabaseReady) return false;
        try {
          const { error } = await supabase.auth.signOut();
          if (error) throw error;
          return true;
        } catch (err) {
          console.error('[Supabase] signOut error:', err.message);
          return false;
        }
      }
      
      function onAuthStateChange(callback) {
        if (!supabaseReady) return null;
        return supabase.auth.onAuthStateChange((event, session) => {
          callback(event, session);
        });
      }
      
      // Export to window
      window.initializeSupabase = initializeSupabase;
      window.getCurrentUser = getCurrentUser;
      window.getUserProfile = getUserProfile;
      window.signUp = signUp;
      window.signIn = signIn;
      window.signOut = signOut;
      window.onAuthStateChange = onAuthStateChange;
      
      // Helper for supabaseService to get client
      window.getSupabase = () => supabase;
      
      Object.defineProperty(window, 'supabaseReady', {
        get: () => supabaseReady,
        set: (val) => { supabaseReady = val; }
      });
      
      console.log('[Config] ✅ Supabase functions ready');
    } catch(err) {
      console.error('[Config] ERROR:', err.message);
    }
  </script>

  <script>
    (async () => {
      try {
        // Check authentication first
        const authOk = await checkAuth();
        if (!authOk) return;
        
        // Load data from Supabase or localStorage
        await loadData();
        
        // Ensure functions are defined
        if (typeof renderNav === 'undefined') {
          console.error('[ERROR] renderNav is not defined, waiting...');
          await new Promise(r => setTimeout(r, 1000));
        }
        
        if (typeof renderNav !== 'undefined') {
          renderNav();
          renderPanel();
        } else {
          console.error('[ERROR] renderNav still not defined after waiting');
        }
      } catch (err) {
        console.error('[Init Error]', err);
      }
    })();
  </script>
