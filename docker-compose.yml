version: '3.8'

services:
  # TBR Service Center Frontend
  tbr-app:
    build: .
    container_name: tbr-system
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    restart: always
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx Reverse Proxy (for SSL/TLS)
  # nginx:
  #   image: nginx:alpine
  #   container_name: tbr-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - tbr-app
  #   restart: always

# Usage:
# 1. Start:  docker-compose up -d
# 2. View logs: docker-compose logs -f
# 3. Stop: docker-compose down
# 4. Rebuild: docker-compose up -d --build
